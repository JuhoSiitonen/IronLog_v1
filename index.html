<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronLog">
<title>IronLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080810;overscroll-behavior:none}
body{font-family:'DM Sans',sans-serif;color:#f2f0ea;max-width:430px;margin:0 auto}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ex-card{animation:slideUp .25s ease both}
.pop-in{animation:pop .35s ease}
.rest-pulse{animation:pulse 1s infinite}
.fade-in{animation:fadeIn .2s ease}
/* Layout */
#app{min-height:100vh}
.page{padding:24px 20px 110px}
.hdr{padding:48px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
/* Typography */
.logo{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.15em;color:#e8ff47}
.hdr-sub{font-size:12px;color:#4a4a6a;margin-top:2px}
.h1{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;line-height:1;margin-bottom:4px}
.h2{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:12px}
.sub{font-size:13px;color:#4a4a6a;margin-bottom:24px}
.sec-title{font-size:12px;color:#4a4a6a;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:10px}
/* Cards */
.card{background:#10101a;border:1px solid #1c1c2e;border-radius:16px;padding:16px 18px;margin-bottom:10px}
.acard{background:#141420;border:1px solid #e8ff4733;border-radius:16px;padding:16px 18px;margin-bottom:10px}
.scard{background:#0e1a1a;border:1px solid #47ffe833;border-radius:16px;padding:14px 18px;margin-bottom:10px}
/* Stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.stat-box{background:#10101a;border:1px solid #1c1c2e;border-radius:14px;padding:14px 10px;text-align:center}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:#e8ff47;line-height:1}
.stat-val span{font-size:16px;color:#4a4a6a}
.stat-lbl{font-size:10px;color:#4a4a6a;margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
/* Buttons */
.btn-primary{background:#e8ff47;color:#080810;border:none;border-radius:14px;padding:17px 24px;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:.06em;width:100%}
.btn-primary:disabled{opacity:.35;cursor:default}
.btn-ghost{background:transparent;color:#f2f0ea;border:1px solid #1c1c2e;border-radius:14px;
  padding:13px 24px;font-weight:600;font-size:14px;width:100%}
.btn-back{background:none;border:none;color:#e8ff47;font-weight:700;font-size:13px;padding:0}
.btn-tiny{background:transparent;color:#4a4a6a;border:1px solid #1c1c2e;border-radius:8px;padding:6px 12px;font-size:12px}
.btn-swap{background:#1c1c30;border:1px solid #1c1c2e;border-radius:8px;padding:4px 10px;
  color:#4a4a6a;font-size:11px;font-weight:600;white-space:nowrap}
/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:#0c0c18;border-top:1px solid #1c1c2e;display:flex;
  padding:10px 0 max(22px,env(safe-area-inset-bottom,22px));z-index:100}
.nav-btn{flex:1;background:none;border:none;font-size:10px;font-weight:500;color:#4a4a6a;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;
  letter-spacing:.04em;text-transform:uppercase}
.nav-btn.active{color:#e8ff47;font-weight:700}
/* Tags */
.tag{display:inline-block;background:#1c1c30;border-radius:6px;padding:2px 8px;font-size:11px;color:#4a4a6a;margin-right:4px}
.mtag{display:inline-block;background:#1a1a2e;border-radius:4px;padding:1px 7px;font-size:10px;
  color:#5a5a9a;margin-left:6px;font-weight:600;letter-spacing:.04em;vertical-align:middle}
.badge{display:inline-block;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700}
/* Progress */
.progress-track{background:#10101a;border-radius:99px;height:5px;margin-bottom:20px;overflow:hidden}
.progress-fill{background:#e8ff47;height:100%;border-radius:99px;transition:width .4s ease}
/* Rest bar — fixed at bottom above nav */
.rest-bar{position:fixed;bottom:calc(max(22px,env(safe-area-inset-bottom,22px)) + 54px);left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:398px;
  background:#0c0c18;backdrop-filter:blur(10px);z-index:200;padding:14px 18px;
  display:none;justify-content:space-between;align-items:center;border:1px solid #1c1c2e;border-radius:16px;box-shadow:0 -2px 20px #000a}
.rest-bar.visible{display:flex}
/* Exercise card header */
.ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ex-title-area{flex:1}
.ex-title{font-weight:700;font-size:16px;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.ex-meta{font-size:11px;color:#4a4a6a;margin-top:2px}
.ex-actions{display:flex;gap:6px;align-items:center;margin-left:8px;flex-shrink:0}
.cue-box{background:#0a0a18;border-radius:8px;padding:7px 10px;margin-bottom:10px;
  font-size:11px;color:#5555aa;border-left:2px solid #e8ff4744}
.last-info{font-size:11px;color:#4a4a6a;margin-bottom:10px}
/* Set grid */
.set-grid{display:grid;grid-template-columns:28px 1fr 1fr 52px;gap:6px;align-items:center;margin-bottom:6px}
.set-col-hdr{display:grid;grid-template-columns:28px 1fr 1fr 52px;gap:6px;margin-bottom:6px}
.set-col-hdr span{font-size:10px;color:#4a4a6a;text-align:center;text-transform:uppercase;letter-spacing:.05em}
.set-num{text-align:center;font-size:12px;font-weight:700;color:#4a4a6a}
.set-num.done{color:#e8ff47}
/* Reps button */
.rep-btn{background:#080810;border:1px solid #1c1c2e;border-radius:10px;padding:11px 8px;
  color:#4a4a6a;font-size:15px;width:100%;text-align:center;font-weight:400}
.rep-btn.has-val{color:#f2f0ea;font-weight:700}
.rep-btn.editing{border-color:#ee8877}
.rep-display{background:#e8ff4718;border:1px solid #e8ff4755;border-radius:10px;padding:11px 8px;
  color:#e8ff47;font-weight:700;font-size:15px;text-align:center}
/* KG input */
.kg-inp{background:#080810;border:1px solid #1c1c2e;border-radius:10px;padding:11px 12px;
  color:#f2f0ea;font-size:15px;text-align:center;width:100%}
.kg-inp:focus{border-color:#e8ff47;outline:none}
.kg-inp.editing{border-color:#ee8877}
.kg-display{background:#e8ff4718;border:1px solid #e8ff4755;border-radius:10px;padding:11px 8px;
  color:#e8ff47;font-weight:700;font-size:15px;text-align:center}
/* Action buttons */
.btn-check{background:#e8ff47;border:none;border-radius:10px;padding:11px 0;
  color:#080810;font-weight:800;font-size:13px;width:100%}
.btn-check.dim{opacity:.4;cursor:default}
.btn-emoji{background:none;border:none;font-size:22px;width:100%;text-align:center;padding:4px 0}
/* Swap modal */
.modal-overlay{position:fixed;inset:0;background:#000000cc;z-index:500;
  display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal-sheet{background:#12121e;border-radius:20px 20px 0 0;width:100%;max-width:430px;
  margin:0 auto;max-height:75vh;overflow:hidden;display:flex;flex-direction:column}
.modal-hdr{padding:18px 20px 12px;border-bottom:1px solid #1c1c2e;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-body{overflow-y:auto;padding:12px 16px 24px;-webkit-overflow-scrolling:touch}
.swap-item{padding:12px 14px;border-radius:12px;margin-bottom:8px;cursor:pointer;border:1px solid #1c1c2e}
.swap-item.active{background:#1c1c10;border-color:#e8ff47}
.swap-item.in-use{background:#14141e;opacity:.4;cursor:default}
.swap-item.available{background:#16161e}
.swap-row{display:flex;justify-content:space-between;align-items:center}
.swap-cue{font-size:11px;color:#4a4a7a;margin-top:4px}
/* Block selector */
.block-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px}
.block-tab{padding:8px 4px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;
  border-radius:10px;letter-spacing:.02em;line-height:1.2;border:2px solid transparent}
/* Day list */
.day-card{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.day-arrow{color:#4a4a6a;font-size:18px}
/* Complete */
.complete-center{text-align:center;padding-top:56px;padding-bottom:28px}
/* Misc */
.row{display:flex;justify-content:space-between;align-items:center}
.ex-pill{background:#0a0a18;border-radius:8px;padding:5px 10px;
  display:inline-flex;align-items:center;gap:6px;margin:3px;font-size:12px}
.hint-text{font-size:10px;color:#4a4a6a;text-align:right;margin-bottom:8px;letter-spacing:.03em}

</head>

// STORAGE
// ═══════════════════════════════════════════════════════════════════
const SK={weights:"il_weights",history:"il_history",nextDay:"il_nextDay",blockCompletions:"il_blockCompletions",settings:"il_settings"};
const ls={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
function getSettings(){return Object.assign({restEnabled:true,restSecs:90,lang:'en'},ls.get(SK.settings)||{});}
function saveSettings(s){ls.set(SK.settings,s);}
function getLang(){return getSettings().lang;}
function t(key){const l=getLang();return(TRANS[l]&&TRANS[l][key])||TRANS.en[key]||key;}
// blockCompletions = total number of full-block completions ever.
function getTotalBlockCompletions(){return ls.get(SK.blockCompletions)||0;}
function initAndGetBlockIdx(){
  const completions=getTotalBlockCompletions();
  return Math.floor(completions/2)%BLOCKS.length;
}
// Returns how many exercise sessions remain until the next block swap.
// A full block = 3 sessions (A+B+C). 2 full blocks = 6 sessions.
// We track completions in "full-block" units, but sessions within the
// current block-cycle are tracked via history days done.
function getSessionsUntilSwap(){
  const sessionsInCycle=getSessionsInCurrentBlockCycle();
  return Math.max(0,6-sessionsInCycle);
}
// How many sessions have been logged in the current 2-completion cycle (mod 6)?
function getSessionsInCurrentBlockCycle(){
  const totalSessions=getHistory().length;
  return totalSessions%totalSessionsForSwap();
}
function totalSessionsForSwap(){return 6;}
// Called after each workout to check if we've completed a full block
// and if so, bump the completion counter.
function maybeAdvanceBlock(){
  const nxt=getNextDayId(); // already advanced by advanceDay() before this call
  if(nxt==="A"){
    const c=getTotalBlockCompletions()+1;
    ls.set(SK.blockCompletions,c);
  }
}
function getNextDayId(){return ls.get(SK.nextDay)||"A";}
function getHistory(){return ls.get(SK.history)||[];}
function getLastWeight(id){return(ls.get(SK.weights)||{})[id]||null;}
function saveWeight(id,w){const ws=ls.get(SK.weights)||{};ws[id]=w;ls.set(SK.weights,ws);}
function advanceDay(cur){const o=["A","B","C"];ls.set(SK.nextDay,o[(o.indexOf(cur)+1)%3]);}
function getExerciseHistory(id){
  return getHistory().map(s=>s.exercises&&s.exercises.find(e=>e.id===id)).filter(Boolean).slice(-5);
}
function shouldIncrease(id,topRep){
  const h=getExerciseHistory(id);
  return h.length>0&&h[h.length-1].sets.every(s=>parseInt(s.reps)>=topRep);
}
function isThisISOWeek(dateStr){
  const d=new Date(dateStr),now=new Date();
  const day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()+(day===0?-6:1-day));
  mon.setHours(0,0,0,0);
  return d>=mon;
}
function exName(name){return t(name)||name;}
function muscleName(m){const k='m_'+m.toLowerCase();return t(k)||m;}
function fmtTime(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function fmtDate(iso){const loc=getLang()==='fi'?'fi-FI':'en-GB';return new Date(iso).toLocaleDateString(loc,{day:"numeric",month:"short"});}
function today(){const loc=getLang()==='fi'?'fi-FI':'en-GB';return new Date().toLocaleDateString(loc,{weekday:"short",day:"numeric",month:"short"});}

// ═══════════════════════════════════════════════════════════════════
// APP STATE  (single mutable object — we call render() after changes)
// ═══════════════════════════════════════════════════════════════════
const A={
  view:"home",
  blockIdx:initAndGetBlockIdx(),
  activeDayId:getNextDayId(),
  previewBlockIdx:initAndGetBlockIdx(),
  history:getHistory(),
  // Workout session
  sessionExercises:[],
  sessionSets:{},      // {exId:[{reps,weight,done,editing}]}
  sessionStart:null,
  elapsed:0,
  restTimer:null,
  completedSession:null,
  swapTarget:null,
  // Internal timers
  _elapsedInterval:null,
  _restInterval:null,
  _restEnd:null,
};

// ═══════════════════════════════════════════════════════════════════
// TIMER MANAGEMENT
// ═══════════════════════════════════════════════════════════════════
function startElapsed(){
  clearInterval(A._elapsedInterval);
  A._elapsedInterval=setInterval(()=>{
    A.elapsed=Math.floor((Date.now()-A.sessionStart)/1000);
    const el=document.getElementById('elapsed-txt');
    if(el)el.textContent=`${BLOCKS[A.blockIdx].label} · ${t('nav_log')} ${A.activeDayId} · ${fmtTime(A.elapsed)}`;
  },1000);
}
function stopElapsed(){clearInterval(A._elapsedInterval);A.elapsed=0;}

function startRest(secs){
  clearTimeout(A._restInterval);
  A._restEnd=Date.now()+secs*1000;
  A.restTimer=secs;
  tickRest();
}
function tickRest(){
  const remaining=A._restEnd?Math.ceil((A._restEnd-Date.now())/1000):0;
  if(remaining>0){
    A.restTimer=remaining;
    refreshRestBar();
    A._restInterval=setTimeout(tickRest,500); // poll every 500ms — survives throttling
  }else{
    A.restTimer=null;
    A._restEnd=null;
    refreshRestBar();
  }
}
function skipRest(){
  clearTimeout(A._restInterval);
  A.restTimer=null;
  A._restEnd=null;
  refreshRestBar();
}
function refreshRestBar(){
  const bar=document.getElementById('rest-bar');
  if(!bar)return;
  if(A.restTimer!==null&&A.restTimer>0){
    bar.classList.add('visible');
    const timeEl=bar.querySelector('#rest-time');
    if(timeEl)timeEl.textContent=`${getLang()==='fi'?'LEPO':'REST'} · ${fmtTime(A.restTimer)}`;
  }else{
    bar.classList.remove('visible');
  }
}
// When screen wakes up, re-sync the rest timer immediately
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&A._restEnd){
    clearTimeout(A._restInterval);
    tickRest();
  }
});

// ═══════════════════════════════════════════════════════════════════
// SESSION LOGIC
// ═══════════════════════════════════════════════════════════════════
function buildInitialSets(exercises){
  const init={};
  exercises.forEach(ex=>{
    const lw=getLastWeight(ex.id);
    const bump=shouldIncrease(ex.id,ex.repRange[1]);
    const w=lw?(bump?String(Math.round(lw*1.025*2)/2):String(lw)):"";
    init[ex.id]=Array.from({length:ex.sets},()=>({reps:"",weight:w,done:false,editing:false}));
  });
  return init;
}

function startWorkout(dayId,block){
  block=block||BLOCKS[A.blockIdx];
  const day=block.days.find(d=>d.id===dayId);
  A.activeDayId=dayId;
  A.sessionExercises=day.exercises.map(e=>({...e}));
  A.sessionSets=buildInitialSets(A.sessionExercises);
  A.sessionStart=Date.now();
  A.elapsed=0;
  A.restTimer=null;
  A._restEnd=null;
  clearTimeout(A._restInterval);
  startElapsed();
  navigate("workout");
}

function swapExercise(oldId,newEx){
  A.sessionExercises=A.sessionExercises.map(e=>e.id===oldId?{...newEx}:e);
  delete A.sessionSets[oldId];
  const lw=getLastWeight(newEx.id);
  const bump=shouldIncrease(newEx.id,newEx.repRange[1]);
  const w=lw?(bump?String(Math.round(lw*1.025*2)/2):String(lw)):"";
  A.sessionSets[newEx.id]=Array.from({length:newEx.sets},()=>({reps:"",weight:w,done:false,editing:false}));
  A.swapTarget=null;
  render();
}

function cycleReps(exId,idx,repRange){
  const sets=A.sessionSets[exId];
  if(!sets)return;
  const current=parseInt(sets[idx].reps);
  const[lo,hi]=repRange;
  const next=(!sets[idx].reps||isNaN(current)||current<=lo)?hi:current-1;
  sets[idx]={...sets[idx],reps:String(next)};
  // Only re-render the specific rep button to avoid full page flicker
  const btn=document.getElementById(`rep-btn-${exId}-${idx}`);
  if(btn){
    btn.textContent=String(next);
    btn.classList.add('has-val');
    btn.classList.remove('editing');
    // Update check button opacity
    const chk=document.getElementById(`chk-btn-${exId}-${idx}`);
    if(chk)chk.disabled=false;
  }
}

function markSetDone(exId,idx){
  const sets=A.sessionSets[exId];
  if(!sets||!sets[idx].reps)return;
  const w=parseFloat(sets[idx].weight);
  sets[idx]={...sets[idx],done:true,editing:false};
  if(!isNaN(w)&&w>0)saveWeight(exId,w);
  const cfg=getSettings();
  if(cfg.restEnabled)startRest(cfg.restSecs);
  renderSetRow(exId,idx);
  updateProgress();
  updateFinishBtn();
}

function enterEditMode(exId,idx){
  A.sessionSets[exId][idx]={...A.sessionSets[exId][idx],editing:true};
  skipRest();
  renderSetRow(exId,idx);
}

function saveEdit(exId,idx){
  const set=A.sessionSets[exId][idx];
  if(!set.reps)return;
  const w=parseFloat(set.weight);
  if(!isNaN(w)&&w>0)saveWeight(exId,w);
  A.sessionSets[exId][idx]={...set,done:true,editing:false};
  renderSetRow(exId,idx);
  updateProgress();
  updateFinishBtn();
}

function updateKg(exId,idx,val){
  A.sessionSets[exId][idx]={...A.sessionSets[exId][idx],weight:val};
  // Propagate forward to all subsequent undone sets
  A.sessionSets[exId].forEach((s,i)=>{
    if(i>idx&&!s.done){
      A.sessionSets[exId][i]={...A.sessionSets[exId][i],weight:val};
      const el=document.getElementById(`kg-inp-${exId}-${i}`);
      if(el)el.value=val;
    }
  });
}

function finishWorkout(force){
  if(!force&&!allDone())return;
  const block=BLOCKS[A.blockIdx];
  const day=block.days.find(d=>d.id===A.activeDayId);
  const session={
    id:Date.now(),
    date:new Date().toISOString(),
    blockId:block.id,blockLabel:block.label,
    dayId:A.activeDayId,dayLabel:day.label,
    duration:Math.round((Date.now()-A.sessionStart)/60000),
    exercises:A.sessionExercises.map(ex=>({
      id:ex.id,name:ex.name,muscle:ex.muscle,
      sets:(A.sessionSets[ex.id]||[]).map(s=>({reps:s.reps,weight:s.weight,done:s.done}))
    }))
  };
  A.history=[...A.history,session];
  ls.set(SK.history,A.history);
  advanceDay(A.activeDayId);
  maybeAdvanceBlock();
  stopElapsed();
  clearTimeout(A._restInterval);
  A.restTimer=null;
  A._restEnd=null;
  A.blockIdx=initAndGetBlockIdx();
  A.previewBlockIdx=A.blockIdx;
  A.activeDayId=getNextDayId();
  A.completedSession=session;
  navigate("complete");
}

// ═══════════════════════════════════════════════════════════════════
// DERIVED
// ═══════════════════════════════════════════════════════════════════
function doneSets(){return Object.values(A.sessionSets).flat().filter(s=>s.done).length;}
function totalSets(){return Object.values(A.sessionSets).flat().length;}
function allDone(){
  return A.sessionExercises.length>0&&
    A.sessionExercises.every(ex=>{
      const sets=A.sessionSets[ex.id]||[];
      return sets.length>0&&sets.every(s=>s.done);
    });
}

// ═══════════════════════════════════════════════════════════════════
// PARTIAL DOM UPDATES (avoid full re-render during workout)
// ═══════════════════════════════════════════════════════════════════
function renderSetRow(exId,idx){
  const container=document.getElementById(`set-row-${exId}-${idx}`);
  if(!container)return;
  const ex=A.sessionExercises.find(e=>e.id===exId);
  if(!ex)return;
  container.innerHTML=buildSetRowHTML(ex,idx,A.sessionSets[exId][idx]);
}

function updateProgress(){
  const done=doneSets(),total=totalSets();
  const pct=total?Math.round(done/total*100):0;
  const fill=document.getElementById('progress-fill');
  if(fill)fill.style.width=pct+'%';
}

function updateFinishBtn(){
  const btn=document.getElementById('finish-btn');
  if(!btn)return;
  const done=doneSets(),total=totalSets();
  if(allDone()){
    btn.disabled=false;
    btn.textContent=t('finish_workout');
    const hint=document.getElementById('quitter-area');
    if(hint)hint.style.display='none';
  }else{
    btn.disabled=true;
    btn.textContent=`${done} / ${total} ${t('sets_done')}`;
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildSetRowHTML(ex,si,set){
  const repLabel=set.reps?set.reps:(ex.repRange[0]===ex.repRange[1]?`${ex.repRange[0]}`:`${ex.repRange[0]}–${ex.repRange[1]}`);
  const isPlaceholder=!set.reps;
  const isEditing=set.editing===true;

  // Set number cell
  const numCell=set.done&&!isEditing
    ?`<div class="set-num done">✓</div>`
    :`<div class="set-num">${si+1}</div>`;

  // Reps cell
  let repsCell;
  if(!set.done||isEditing){
    const cls='rep-btn'+(isPlaceholder?'':' has-val')+(isEditing?' editing':'');
    repsCell=`<button id="rep-btn-${ex.id}-${si}" class="${cls}" onclick="cycleReps('${ex.id}',${si},[${ex.repRange}])">${repLabel}</button>`;
  }else{
    repsCell=`<div class="rep-display">${esc(set.reps)}</div>`;
  }

  // KG cell
  let kgCell;
  if(!set.done||isEditing){
    const cls='kg-inp'+(isEditing?' editing':'');
    kgCell=`<input id="kg-inp-${ex.id}-${si}" class="${cls}" type="number" placeholder="kg" value="${esc(set.weight)}"
      oninput="updateKg('${ex.id}',${si},this.value)">`;
  }else{
    kgCell=`<div class="kg-display">${esc(set.weight)}kg</div>`;
  }

  // Action cell
  let actionCell;
  if(isEditing){
    const dim=set.reps?'':'dim';
    actionCell=`<button id="chk-btn-${ex.id}-${si}" class="btn-check ${dim}" onclick="saveEdit('${ex.id}',${si})" ${set.reps?'':'disabled'}>✓</button>`;
  }else if(!set.done){
    const dim=set.reps?'':'dim';
    actionCell=`<button id="chk-btn-${ex.id}-${si}" class="btn-check ${dim}" onclick="markSetDone('${ex.id}',${si})" ${set.reps?'':'disabled'}>✓</button>`;
  }else{
    // Done — double-tap emoji to enter edit mode
    // Use a tap counter approach for mobile double-tap
    actionCell=`<button class="btn-emoji" id="emoji-btn-${ex.id}-${si}" onclick="handleEmojiTap('${ex.id}',${si})">💪🏻</button>`;
  }

  return`${numCell}${repsCell}${kgCell}${actionCell}`;
}

// Double-tap detection for emoji button
const _tapTimers={};
function handleEmojiTap(exId,idx){
  const key=`${exId}-${idx}`;
  if(_tapTimers[key]){
    clearTimeout(_tapTimers[key]);
    delete _tapTimers[key];
    enterEditMode(exId,idx);
  }else{
    _tapTimers[key]=setTimeout(()=>{delete _tapTimers[key];},350);
  }
}

function buildExerciseCard(ex,ei){
  const sets=A.sessionSets[ex.id]||[];
  const exDone=sets.length>0&&sets.every(s=>s.done);
  const bump=shouldIncrease(ex.id,ex.repRange[1]);
  const prev=getExerciseHistory(ex.id);
  const lastS=prev.length?prev[prev.length-1]:null;
  const wts=lastS?lastS.sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0):[];
  const lastW=wts.length?Math.max(...wts):0;
  const lastR=lastS?Math.round(lastS.sets.reduce((a,s)=>a+(parseInt(s.reps)||0),0)/lastS.sets.length):0;

  const bumpBadge=bump&&!exDone?`<span class="badge" style="background:#e8ff4722;color:#e8ff47">${t('load_badge')}</span>`:'';
  const swapBtn=exDone?'':`<button class="btn-swap" onclick="openSwap('${ex.id}','${ex.muscle}')">${t('swap_btn')}</button>`;
  const doneIcon=exDone?'<span style="color:#e8ff47">✓ </span>':'';
  const lastInfo=lastW>0
    ?`<div class="last-info">${t('last')}: <span style="color:#f2f0ea;font-weight:600">${lastW}kg × ~${lastR} ${t('reps')}</span>${bump?` <span style="color:#e8ff47;font-weight:700">→ ${t('try')} ${Math.round(lastW*1.025*2)/2}kg</span>`:''}</div>`
    :'';

  let setsHTML='';
  sets.forEach((set,si)=>{
    setsHTML+=`<div id="set-row-${ex.id}-${si}" class="set-grid">${buildSetRowHTML(ex,si,set)}</div>`;
  });

  return`
  <div class="card ex-card" style="animation-delay:${ei*0.04}s;opacity:${exDone?0.45:1}" id="ex-card-${ex.id}">
    <div class="ex-header">
      <div class="ex-title-area">
        <div class="ex-title">${doneIcon}${esc(exName(ex.name))}<span class="mtag">${esc(muscleName(ex.muscle))}</span></div>
        <div class="ex-meta">${ex.sets} ${t('sets')} · ${ex.repRange[0]}–${ex.repRange[1]} ${t('reps')}</div>
      </div>
      <div class="ex-actions">${bumpBadge}${swapBtn}</div>
    </div>
    <div class="cue-box">💡 ${esc(ex.cues)}</div>
    ${lastInfo}
    <div class="set-col-hdr"><span>#</span><span>${t('sets_col')}</span><span>kg</span><span></span></div>
    <div class="hint-text">${t('double_tap')}</div>
    ${setsHTML}
  </div>`;
}

// SWAP MODAL
// ═══════════════════════════════════════════════════════════════════
function openSwap(exId,muscle){
  A.swapTarget={exId,muscle};
  const alts=LIBRARY[muscle]||[];
  const currentIds=A.sessionExercises.map(e=>e.id);
  let items='';
  alts.forEach(alt=>{
    const inUse=currentIds.includes(alt.id)&&alt.id!==exId;
    const isActive=alt.id===exId;
    const lw=getLastWeight(alt.id);
    const cls='swap-item'+(isActive?' active':inUse?' in-use':' available');
    const click=inUse||isActive?'':`onclick="swapExercise('${exId}',LIBRARY['${muscle}'].find(x=>x.id==='${alt.id}'))"`;
    const label=isActive?`✓ ${esc(exName(alt.name))}`:esc(exName(alt.name));
    const status=isActive?`<div style="font-size:10px;color:#4a4a6a">${t('current')}</div>`:inUse?`<div style="font-size:10px;color:#4a4a6a">${t('in_use')}</div>`:'';
    const cueRow=(!inUse&&!isActive)?`<div class="swap-cue">💡 ${esc(alt.cues)}</div>`:'';
    items+=`<div class="${cls}" ${click}>
      <div class="swap-row">
        <div>
          <div style="font-weight:700;font-size:14px;color:${isActive?'#e8ff47':'#f2f0ea'}">${label}</div>
          <div style="font-size:11px;color:#4a4a6a;margin-top:2px">${alt.sets} ${t('sets')} · ${alt.repRange[0]}–${alt.repRange[1]} ${t('reps')}</div>
        </div>
        <div style="text-align:right">${lw?`<div style="font-size:12px;font-weight:700;color:#e8ff47">${lw}kg</div>`:''}${status}</div>
      </div>${cueRow}
    </div>`;
  });
  const modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.id='swap-modal';
  modal.innerHTML=`
    <div class="modal-sheet">
      <div class="modal-hdr">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px">${t('swap_exercise')}</div>
          <div style="font-size:12px;color:#4a4a6a;margin-top:2px">${t('muscle_label')} <span style="color:#e8ff47;font-weight:700">${esc(muscleName(muscle))}</span></div>
        </div>
        <button class="btn-back" onclick="closeSwap()">✕</button>
      </div>
      <div class="modal-body">${items}</div>
    </div>`;
  document.body.appendChild(modal);
}
function closeSwap(){
  const m=document.getElementById('swap-modal');
  if(m)m.remove();
  A.swapTarget=null;
}

function viewHistory(){

  let content='';
  if(!hist.length){
    content=`<div style="color:#4a4a6a;text-align:center;padding-top:40px">${t('no_sessions')}</div>`;
  }else{
    hist.forEach(session=>{
      const vol=(session.exercises||[]).reduce((a,e)=>a+(e.sets||[]).reduce((b,st)=>b+(parseFloat(st.weight)||0)*(parseFloat(st.reps)||0),0),0);
      const ds=fmtDate(session.date);
      let exRows='';
      (session.exercises||[]).forEach(ex=>{
        const wts=(ex.sets||[]).map(st=>parseFloat(st.weight)||0).filter(w=>w>0);
        const maxW=wts.length?Math.max(...wts):0;

        <div class="row">
          <div style="font-weight:700;font-size:15px">${sessionDayLabel}</div>

            <div style="font-size:11px;color:#e8ff47;font-weight:700">${ds}</div>

  const presets=[30,45,60,90,120,180];
  const presetsHTML=presets.map(s=>{
    const active=cfg.restSecs===s;
    return`<button onclick="setRestSecs(${s})" style="
      flex:1;padding:12px 4px;border-radius:12px;font-family:'Barlow Condensed',sans-serif;
      font-weight:900;font-size:18px;letter-spacing:.02em;border:2px solid ${active?'#e8ff47':'#1c1c2e'};
      background:${active?'#e8ff4718':'#10101a'};color:${active?'#e8ff47':'#4a4a6a'};
      cursor:pointer">${s<60?s+'s':Math.floor(s/60)+(s%60?':'+String(s%60).padStart(2,'0'):'')+'m'}</button>`;
  }).join('');

  const isFi=cfg.lang==='fi';
  return`
  <div class="hdr"><div class="logo">IRONLOG</div></div>
  <div class="page">
    <div class="h2">${t('settings')}</div>

    <div class="sec-title">${t('language')}</div>
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;gap:8px">
        <button onclick="setLang('en')" style="flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;
          border:2px solid ${!isFi?'#e8ff47':'#1c1c2e'};background:${!isFi?'#e8ff4718':'#10101a'};
          color:${!isFi?'#e8ff47':'#4a4a6a'}">🇬🇧 English</button>
        <button onclick="setLang('fi')" style="flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;
          border:2px solid ${isFi?'#e8ff47':'#1c1c2e'};background:${isFi?'#e8ff4718':'#10101a'};
          color:${isFi?'#e8ff47':'#4a4a6a'}">🇫🇮 Suomi</button>
      </div>
    </div>

    <div class="sec-title" style="margin-top:16px">${t('rest_timer')}</div>
    <div class="card" style="margin-bottom:10px">
      <div class="row" style="margin-bottom:${cfg.restEnabled?'18px':'0'}">
        <div>
          <div style="font-weight:700;font-size:15px">${t('enable_rest')}</div>
          <div style="font-size:12px;color:#4a4a6a;margin-top:2px">${t('rest_auto')}</div>
        </div>
        <button onclick="toggleRest()" style="
          width:48px;height:28px;border-radius:99px;border:none;cursor:pointer;
          background:${cfg.restEnabled?'#e8ff47':'#1c1c2e'};
          position:relative;transition:background .2s">
          <div style="
            position:absolute;top:4px;width:20px;height:20px;border-radius:50%;
            background:${cfg.restEnabled?'#080810':'#4a4a6a'};
            left:${cfg.restEnabled?'24px':'4px'};transition:left .2s"></div>
        </button>
      </div>
      ${cfg.restEnabled?`
      <div style="border-top:1px solid #1c1c2e;padding-top:16px">
        <div style="font-size:12px;color:#4a4a6a;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:700">${t('duration')}</div>
        <div style="display:flex;gap:6px;margin-bottom:14px">${presetsHTML}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:12px;color:#4a4a6a;white-space:nowrap">${t('custom_sec')}</div>
          <input type="number" value="${cfg.restSecs}" min="10" max="600"
            oninput="setRestSecs(parseInt(this.value)||90)"
            style="flex:1;background:#080810;border:1px solid #1c1c2e;border-radius:10px;
            padding:10px 12px;color:#f2f0ea;font-size:15px;text-align:center">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#e8ff47;min-width:44px;text-align:right">
            ${cfg.restSecs<60?cfg.restSecs+'s':Math.floor(cfg.restSecs/60)+(cfg.restSecs%60?':'+String(cfg.restSecs%60).padStart(2,'0'):'')+'m'}
          </div>
        </div>
      </div>`:''}
    </div>

    <div class="sec-title" style="margin-top:24px">${t('how_to')}</div>
    <button onclick="openGuide()" class="card" style="width:100%;text-align:left;border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div>
        <div style="font-weight:700;font-size:15px">${t('app_guide')}</div>
        <div style="font-size:12px;color:#4a4a6a;margin-top:2px">${t('app_guide_sub')}</div>
      </div>
      <div style="color:#e8ff47;font-size:20px;margin-left:12px">›</div>
    </button>

  </div>
  ${navHTML("settings")}

  <div id="guide-modal" style="display:none;position:fixed;inset:0;z-index:500;background:#080810;overflow-y:auto;-webkit-overflow-scrolling:touch">
    <div style="max-width:430px;margin:0 auto;padding:0 0 40px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:52px 20px 20px;position:sticky;top:0;background:#080810;border-bottom:1px solid #1c1c2e;z-index:10">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900">${t('guide_title')}</div>
        <button onclick="closeGuide()" style="width:40px;height:40px;border-radius:12px;background:#1c1c2e;border:1px solid #2a2a40;font-size:18px;color:#f2f0ea;cursor:pointer">✕</button>
      </div>
      <div style="padding:20px">

        <div class="sec-title">${t('logging_title')}</div>
        <div class="card" style="margin-bottom:16px">
          ${[
            ['1',t('guide_step1_title'),t('guide_step1')],
            ['2',t('guide_step2_title'),t('guide_step2')],
            ['3',t('guide_step3_title'),t('guide_step3')],
            ['4',t('guide_step4_title'),t('guide_step4')],
            ['5',t('guide_step5_title'),t('guide_step5')],
          ].map(([n,title,desc])=>`
          <div style="display:flex;gap:14px;padding:10px 0;border-top:1px solid #1c1c2e;align-items:flex-start">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:#e8ff47;line-height:1;flex-shrink:0;width:22px">${n}</div>
            <div>
              <div style="font-weight:700;font-size:13px;margin-bottom:2px">${title}</div>
              <div style="font-size:12px;color:#4a4a6a;line-height:1.5">${desc}</div>
            </div>
          </div>`).join('')}
        </div>

        <div class="sec-title">${t('blocks_title')}</div>
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:13px;color:#4a4a6a;line-height:1.6;margin-bottom:10px">${t('guide_blocks_desc')}</div>
          ${[1,2,3,4,5,6].map(n=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid #1c1c2e">
            <div style="font-size:13px;color:#4a4a6a">${isFi?'Lohko':'Block'} ${n}</div>
            <div style="font-size:13px;font-weight:600;color:#f2f0ea">${t('theme'+n)}</div>
          </div>`).join('')}
        </div>

        <div class="sec-title">${t('swap_title')}</div>
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:13px;color:#4a4a6a;line-height:1.6">${t('guide_swap_desc')}</div>
        </div>

        <div class="sec-title">${t('overload_title')}</div>
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:13px;color:#4a4a6a;line-height:1.6">${t('guide_overload_desc')}</div>
        </div>

        <div class="sec-title">${t('data_title')}</div>
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:13px;color:#4a4a6a;line-height:1.6">${t('guide_data_desc')}</div>
        </div>

      </div>
    </div>
  </div>`;
}

function openGuide(){
  const m=document.getElementById('guide-modal');
  if(m){m.style.display='block';m.scrollTop=0;}
}
function closeGuide(){
  const m=document.getElementById('guide-modal');
  if(m)m.style.display='none';
}

function toggleRest(){
  const cfg=getSettings();
  cfg.restEnabled=!cfg.restEnabled;
  saveSettings(cfg);
  render();
}
function setRestSecs(v){
  if(!v||v<10||v>600)return;
  const cfg=getSettings();
  cfg.restSecs=v;
  saveSettings(cfg);
  render();
}

function setLang(lang){
  const cfg=getSettings();
  cfg.lang=lang;
  saveSettings(cfg);
  render();
}

function navHTML(active){
  const items=[
    {id:"home",icon:"🏠",label:t('nav_home')},
    {id:"history",icon:"📋",label:t('nav_log')},
    {id:"program",icon:"📅",label:t('nav_program')},
    {id:"settings",icon:"⚙️",label:t('nav_settings')},
  ];
  return`<nav class="nav">${items.map(it=>`
    <button class="nav-btn${active===it.id?' active':''}" onclick="navigate('${it.id}')">
      ${it.icon}<span>${it.label}</span>
    </button>`).join('')}</nav>`;
}

// ═══════════════════════════════════════════════════════════════════
// NAVIGATION & RENDER
// ═══════════════════════════════════════════════════════════════════
function navigate(view){
  A.view=view;
  render();
  window.scrollTo(0,0);
}

function setPreviewBlock(idx){
  A.previewBlockIdx=idx;
  render();
}

function quitterWorkout(){
  if(!confirm(t('quitter_confirm')))return;
  finishWorkout(true);
}

function cancelWorkout(){
  if(!confirm(t('cancel_confirm')))return;
  stopElapsed();
  clearTimeout(A._restInterval);
  A.restTimer=null;
  A._restEnd=null;
  A.sessionStart=null;
  navigate("home");
}

function render(){
  const app=document.getElementById('app');
  if(!app)return;
  let html='';
  if(A.view==='home')html=viewHome();
  else if(A.view==='workout')html=viewWorkout();
  else if(A.view==='complete')html=viewComplete();
  else if(A.view==='history')html=viewHistory();
  else if(A.view==='program')html=viewProgram();
  else if(A.view==='settings')html=viewSettings();
  app.innerHTML=html;
  // Re-attach rest bar state after workout render
  if(A.view==='workout'){
    refreshRestBar();
  }
}

// ═══════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
